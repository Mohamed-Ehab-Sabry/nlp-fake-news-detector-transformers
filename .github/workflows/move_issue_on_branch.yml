name: Move Issue to In Progress on Branch Creation

on:
  create: # Listens for when a branch or tag is created

jobs:
  automate-project-board:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest

    steps:
      - name: Extract Issue Number from Branch Name
        id: extract
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          ISSUE_NUMBER=$(echo "$BRANCH_NAME" | grep -o -E '[0-9]+' | head -1)
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No issue number found in branch name: $BRANCH_NAME"
            exit 0
          fi
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get Issue Node ID
        id: get_node_id
        run: |
          ISSUE_NUMBER="${{ steps.extract.outputs.issue_number }}"
          NODE_ID=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER --jq '.node_id')
          echo "issue_node_id=$NODE_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move Issue in Project Board
        uses: leonsteinhaeuser/project-beta-automations@v2.1.0
        if: steps.get_node_id.outputs.issue_node_id != ''
        with:
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          organization: Mohamed-Ehab-Sabry
          project_id: 3
          resource_node_id: ${{ steps.get_node_id.outputs.issue_node_id }}
          status_value: "In Progress"
